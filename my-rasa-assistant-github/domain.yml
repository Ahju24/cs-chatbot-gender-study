  utter_general_recursion_intro:
    - text: |
        Recursion is a process in which a function calls itself to solve a problem. A main challenge is that the function may call itself infinitely often, so the process never ends. To prevent such cases, every recursive function needs a base case where the solution is known, and a recursive self-call is not necessary. 
        To handle more complex scenarios, we use a recursive case. This is where you break a large problem down into smaller sub-problems. Each recursive call takes you one step closer to the base case. Finally, the results of these smaller steps are combined to provide the final solution to the original problem.

  utter_general_recursion_intro_emp_gs:
    - text: |
        Think of recursion like mirrors facing each other, {gender_title_emp} {user_name}! It’s a process in which a function calls itself to solve a problem. Recursion is even simpler than mirrors, since it has a base case where the calls end. In this base case, the solution is already known, so the function can finally stop calling itself.
        For the trickier parts, we use a recursive case. This is where you break a large problem down into smaller pieces. Each recursive call takes you one step closer to the base case. Finally, all those small successes are gathered up to give you the complete solution!

  utter_general_recursion_intro_emp_gn:
