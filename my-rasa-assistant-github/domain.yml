  utter_solution_without_condition:
    - text: |
        Here is the full pseudocode:
        FUNCTION toh(n, src, dst, aux): //move n disks from src to dst using aux rod
            IF n ＞=  1 THEN
              toh((n-1), src, aux, dst) // put (n-1) disks to aux by using dst
              move(src, dst) //move one disk from src to dst
              toh((n-1), aux, dst, src) // put (n-1) disk(s) to dst
            ENDIF
          END FUNCTION


