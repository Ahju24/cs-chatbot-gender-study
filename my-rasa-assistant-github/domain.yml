    - text: |
        That’s perfectly fine, {gender_title_emp} {user_name}! Actually, it’s one of my favorite puzzles to introduce to someone for the first time. We’ll figure it out together. Imagine we have three rods and a set of disks in front of us. Our goal is simply to move all the disks from one rod to another. We just have to follow three simple rules:
          1) We can only move one single disk at a time, no rushing!
          2) A move just means taking the very top disk from one stack and gently placing it onto another.
          3) The most important part: we can never place a larger disk on top of a smaller one.
        It might sound a bit technical at first, but it's actually very intuitive once we walk through the steps together!
