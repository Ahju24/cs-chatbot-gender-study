  utter_additional_explanation_emp:
    - text: |
        I'd be happy to explain! 
        You first check whether you have one or more disks. If you have zero disks, your puzzle is already solved!
        Then, you clear the way by moving all the smaller disks (except for the largest on the bottom) to the ‘auxiliary’ rod. Once the path is clear, you can move the largest disk to its final ‘destination’ rod.
        Finally, we move those smaller disks recursively back on top to the ‘destination’! It’s just like dividing a large puzzle into smaller, easier parts. 

  utter_additional_explanation_neu_gs:
    - text: |
        Programmers would explain the code as follows:
          1) If n ＜ 1, no action is required and the function returns. 
          2) Execute a recursive call to move n−1 disks to the auxiliary rod.
          3) Move the n-th disk to the destination. 
          4) Relocate the n-1 disks from the auxiliary rod to the destination. This process repeats until the base case n ＜ 1 is reached.
