  utter_example_code_emp_gs:
    - text: |
        To see this in action, let’s look at a classic logic test used among programmers: Palindromes. A palindrome is just a word that reads the same backward as forward, like ‘level’. Here is the pseudocode:        
        
        FUNCTION palindrome(word):
          len = LENGTH(word)
          IF len ≤ 1 THEN 
            RETURN True
          ELSEIF word［0］!= word［len-1］ THEN 
            RETURN False        
          ELSE
            new＿word = word［1:len-2］
            RETURN palindrome(new＿word) 
          ENDIF
        END FUNCTION
  utter_example_code_emp_gn:
    - text: |
        To see this in action, let’s look at a classic logic test used throughout the programming community: Palindromes. A palindrome is just a word that reads the same backward as forward, like ‘level’. Here is the pseudocode:
        
        FUNCTION palindrome(word):
          len = LENGTH(word)
          IF len ≤ 1 THEN 
            RETURN True
          ELSEIF word［0］!= word［len-1］ THEN 
            RETURN False        
          ELSE
            new＿word = word［1:len-2］
            RETURN palindrome(new＿word) 
          ENDIF
        END FUNCTION

  utter_example_code_neu_gs:
    - text: |
        A common application of this logic among programmers is the palindrome check. A palindrome is defined as a sequence of characters that reads the same backward as forward. The pseudocode is as follows:
        
        FUNCTION palindrome(word):
          len = LENGTH(word)
          IF len ≤ 1 THEN 
            RETURN True
          ELSEIF word［0］!= word［len-1］ THEN 
            RETURN False        
          ELSE
            new＿word = word［1:len-2］
            RETURN palindrome(new＿word) 
          ENDIF
        END FUNCTION
  utter_example_code_neu_gn:
    - text: |
        A common application of this logic within the programming community is the palindrome check. A palindrome is defined as a sequence of characters that reads the same backward as forward. The pseudocode is as follows:
        
        FUNCTION palindrome(word):
          len = LENGTH(word)
          IF len ≤ 1 THEN 
            RETURN True
          ELSEIF word［0］!= word［len-1］ THEN 
            RETURN False        
          ELSE
            new＿word = word［1:len-2］
            RETURN palindrome(new＿word) 
          ENDIF
        END FUNCTION
